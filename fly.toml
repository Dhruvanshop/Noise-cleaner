app = "noise-cleaner"
primary_region = "iad"

[build]

[env]
  ENABLE_AI_DENOISE = "false"
  ENVIRONMENT = "production"
  MAX_FILE_SIZE_MB = "50"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = 10000
    grace_period = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = 5000

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
