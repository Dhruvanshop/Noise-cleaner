version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noise_cleaner_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      - MAX_FILE_SIZE_MB=100
      - ENABLE_AI_DENOISE=false  # Set to true only for non-commercial use
      - NC_TEMP_DIR=/app/temp
      - NC_JOB_TTL=7200
      - LOG_LEVEL=info
    volumes:
      - ./temp:/app/temp
      - ./logs:/app/logs
    networks:
      - noise_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: noise_cleaner_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - web
    networks:
      - noise_net

networks:
  noise_net:
    driver: bridge

volumes:
  temp_data:
  logs_data:
